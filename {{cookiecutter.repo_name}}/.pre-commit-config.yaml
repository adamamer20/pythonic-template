ci:
    autoupdate_schedule: 'monthly'

repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.4.2 # Updated from v0.11.8
  hooks:
    # Run the linter.
    - id: ruff
      types_or: [ python, pyi, jupyter ]
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
      types_or: [ python, pyi, jupyter ]
- repo: https://github.com/astral-sh/uv-pre-commit # New entry
  rev: v0.7.8
  hooks:
    - id: uv-lock
-   repo: https://github.com/asottile/pyupgrade
    rev: v3.19.1
    hooks:
    -   id: pyupgrade
        args: [--py310-plus]
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: check-toml
    -   id: check-yaml
- repo: https://github.com/codespell-project/codespell
  rev: v2.4.1
  hooks:
    - id: codespell
      args: [
        "--ignore-words",
        ".codespellignore",
      ]
- repo: https://github.com/DavidAnson/markdownlint-cli2  # For formatting markdown for documentation
  rev: v0.17.2
  hooks:
    - id: markdownlint-cli2
      args: [
        "--fix",
        "--config",
        ".markdownlint.json", # This file needs to be in {{cookiecutter.repo_name}}
      ]
- repo: https://github.com/jsh9/pydoclint  # For checking docstrings
  rev: 0.6.6
  hooks:
    - id: pydoclint
      args: [--style=numpy, --skip-checking-raises=True, --allow-init-docstring=True]
- repo: local # New entry
  hooks:
    - id: typeguard-test
      name: runtime type-check (pytest)
      entry: bash -c 'DEV_TYPECHECK=1 pytest -q'
      language: system
      stages: [push]
