name: Docker

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: "{{ '${{ github.repository }}' }}"

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if Docker is enabled
        id: docker-check
        run: |
          if [ -f "Dockerfile" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "Docker not enabled for this project, skipping Docker workflow"
          fi

      - name: Set up Docker Buildx
        if: steps.docker-check.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: steps.docker-check.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: "{{ '${{ env.REGISTRY }}' }}"
          username: "{{ '${{ github.actor }}' }}"
          password: "{{ '${{ secrets.GITHUB_TOKEN }}' }}"

      - name: Extract metadata
        if: steps.docker-check.outputs.enabled == 'true'
        id: meta-runtime
        uses: docker/metadata-action@v5
        with:
          images: "{{ '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' }}"
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for development image
        if: steps.docker-check.outputs.enabled == 'true'
        id: meta-dev
        uses: docker/metadata-action@v5
        with:
          images: "{{ '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dev' }}"
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push runtime image
        if: steps.docker-check.outputs.enabled == 'true'
        id: build-runtime
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          target: runtime
          push: true
          tags: "{{ '${{ steps.meta-runtime.outputs.tags }}' }}"
          labels: "{{ '${{ steps.meta-runtime.outputs.labels }}' }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push development image
        if: steps.docker-check.outputs.enabled == 'true'
        id: build-dev
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          target: development
          push: true
          tags: "{{ '${{ steps.meta-dev.outputs.tags }}' }}"
          labels: "{{ '${{ steps.meta-dev.outputs.labels }}' }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation for runtime image
        if: steps.docker-check.outputs.enabled == 'true'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: "{{ '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' }}"
          subject-digest: "{{ '${{ steps.build-runtime.outputs.digest }}' }}"
          push-to-registry: true

      - name: Generate artifact attestation for development image
        if: steps.docker-check.outputs.enabled == 'true'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: "{{ '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dev' }}"
          subject-digest: "{{ '${{ steps.build-dev.outputs.digest }}' }}"
          push-to-registry: true