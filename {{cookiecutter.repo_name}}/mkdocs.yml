site_name: "{{ cookiecutter.project_name }}" # Adapted
repo_url: "https://github.com/{{ cookiecutter.github_username }}/{{ cookiecutter.repo_name }}" # Adapted
repo_name: "{{ cookiecutter.github_username }}/{{ cookiecutter.repo_name }}" # Adapted
theme:
  name: material
  # Assuming the user wants the default palette and features if no specific file was "uploaded" to me.
  # If a specific theme config was provided elsewhere and I missed it, this might need adjustment.
  # For now, using the example from the original plan:
  palette:
    scheme: default
  features:
    - navigation.instant
    - toc.autohide

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy # As per original plan's B4
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.superfences
  # Add any other extensions from the "user uploaded" file if it becomes available.
  # For now, these are from the original plan's B4.
